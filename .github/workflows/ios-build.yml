name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      TEAM_ID: "9ZQY7HY294"
      BUNDLE_ID: "com.amailogy.nanmonme"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Create signing certificate and setup keychain
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          set -euo pipefail

          # --- 1. Setup API key file ---
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # --- 2. Create temporary keychain ---
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          # --- 3. Generate private key and CSR ---
          openssl genrsa -out ~/cert_key.pem 2048
          openssl req -new -key ~/cert_key.pem -out ~/cert.csr \
            -subj "/CN=iOS Distribution/O=Personal/C=JP"

          # --- 4. Use Node.js for JWT + App Store Connect API ---
          node << 'NODEJS_EOF'
          const crypto = require("crypto");
          const fs = require("fs");
          const https = require("https");
          const path = require("path");

          const keyId = process.env.APP_STORE_CONNECT_KEY_ID;
          const issuerId = process.env.APP_STORE_CONNECT_ISSUER_ID;
          const keyPath = path.join(require("os").homedir(), `.private_keys/AuthKey_${keyId}.p8`);
          const keyData = fs.readFileSync(keyPath, "utf8");

          // --- Create JWT ---
          function base64url(data) {
            return Buffer.from(data).toString("base64url");
          }
          const header = base64url(JSON.stringify({ alg: "ES256", kid: keyId, typ: "JWT" }));
          const now = Math.floor(Date.now() / 1000);
          const payload = base64url(JSON.stringify({
            iss: issuerId, iat: now, exp: now + 1200, aud: "appstoreconnect-v1"
          }));
          const signInput = `${header}.${payload}`;
          const sign = crypto.createSign("SHA256");
          sign.update(signInput);
          const derSig = sign.sign(keyData);
          // Convert DER to raw r||s (64 bytes) for ES256
          function derToJose(derSig) {
            let offset = 2;
            if (derSig[1] > 128) offset = 3;
            let rLen = derSig[offset + 1];
            let rStart = offset + 2;
            let r = derSig.subarray(rStart, rStart + rLen);
            if (r[0] === 0) r = r.subarray(1);
            let sOffset = rStart + rLen;
            let sLen = derSig[sOffset + 1];
            let sStart = sOffset + 2;
            let s = derSig.subarray(sStart, sStart + sLen);
            if (s[0] === 0) s = s.subarray(1);
            const buf = Buffer.alloc(64);
            r.copy(buf, 32 - r.length);
            s.copy(buf, 64 - s.length);
            return buf.toString("base64url");
          }
          const jwt = `${signInput}.${derToJose(derSig)}`;
          console.log("✅ JWT created successfully");

          // --- API helper ---
          function apiRequest(method, urlPath, body) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: "api.appstoreconnect.apple.com",
                path: urlPath,
                method,
                headers: {
                  Authorization: `Bearer ${jwt}`,
                  "Content-Type": "application/json",
                },
              };
              const req = https.request(options, (res) => {
                let data = "";
                res.on("data", (chunk) => (data += chunk));
                res.on("end", () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve(data ? JSON.parse(data) : null);
                  } else {
                    console.error(`API Error ${res.statusCode}: ${data}`);
                    reject(new Error(`API ${res.statusCode}: ${data}`));
                  }
                });
              });
              req.on("error", reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          // Helper: create or replace a certificate of given type
          async function ensureCert(certType, label) {
            console.log(`\n--- ${label} ---`);

            // First, revoke ALL existing certs of this type (we don't have their private keys)
            console.log(`Checking existing ${certType} certificates...`);
            const listResp = await apiRequest("GET",
              `/v1/certificates?filter[certificateType]=${certType}&limit=200`);
            const existing = listResp.data || [];
            console.log(`Found ${existing.length} existing ${certType} cert(s)`);

            for (const cert of existing) {
              console.log(`Revoking ${cert.id}...`);
              try {
                await apiRequest("DELETE", `/v1/certificates/${cert.id}`);
              } catch (e) {
                console.log(`Warning: could not revoke ${cert.id}: ${e.message}`);
              }
            }

            // Create new certificate with our CSR
            const csrContent = fs.readFileSync(
              path.join(require("os").homedir(), "cert.csr"), "utf8");
            console.log(`Creating new ${certType} certificate...`);
            const createResp = await apiRequest("POST", "/v1/certificates", {
              data: {
                type: "certificates",
                attributes: { certificateType: certType, csrContent },
              },
            });
            const certContent = createResp.data.attributes.certificateContent;
            console.log(`✅ ${label} created`);
            return certContent;
          }

          async function main() {
            // Create BOTH Development and Distribution certificates
            // Xcode automatic signing needs Development cert for building
            const devCert = await ensureCert("DEVELOPMENT", "Apple Development Certificate");
            const distCert = await ensureCert("IOS_DISTRIBUTION", "iOS Distribution Certificate");

            // Save both certificates - we'll import both into keychain
            const home = require("os").homedir();
            fs.writeFileSync(`${home}/cert_dev.cer`, Buffer.from(devCert, "base64"));
            fs.writeFileSync(`${home}/cert_dist.cer`, Buffer.from(distCert, "base64"));
            console.log("\n✅ Both certificates saved");
          }

          main().catch((err) => {
            console.error("FATAL:", err.message);
            process.exit(1);
          });
          NODEJS_EOF

          # --- 5. Create PKCS12 and import BOTH certs into keychain ---
          CERT_PASSWORD=$(openssl rand -hex 12)

          # Import Development certificate
          openssl x509 -inform DER -in ~/cert_dev.cer -out ~/cert_dev.pem
          openssl pkcs12 -export -out ~/cert_dev.p12 \
            -inkey ~/cert_key.pem -in ~/cert_dev.pem \
            -passout "pass:$CERT_PASSWORD"
          security import ~/cert_dev.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          # Import Distribution certificate
          openssl x509 -inform DER -in ~/cert_dist.cer -out ~/cert_dist.pem
          openssl pkcs12 -export -out ~/cert_dist.p12 \
            -inkey ~/cert_key.pem -in ~/cert_dist.pem \
            -passout "pass:$CERT_PASSWORD"
          security import ~/cert_dist.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Certificates in keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "✅ Both signing certificates installed successfully"

      - name: Build iOS app
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="9ZQY7HY294" \
            CODE_SIGN_STYLE="Automatic" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cd ios/App
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9ZQY7HY294</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: ios/App/build/export/*.ipa

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f ~/cert_key.pem ~/cert.csr ~/cert_dev.* ~/cert_dist.* 2>/dev/null || true
