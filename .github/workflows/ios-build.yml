name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      TEAM_ID: "9ZQY7HY294"
      BUNDLE_ID: "com.amailogy.nanmonme"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Python JWT library
        run: pip3 install PyJWT cryptography

      - name: Create signing certificate and setup keychain
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          set -euo pipefail

          # --- 1. Setup API key file ---
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # --- 2. Create temporary keychain ---
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          # --- 3. Generate private key and CSR ---
          openssl genrsa -out ~/cert_key.pem 2048
          openssl req -new -key ~/cert_key.pem -out ~/cert.csr \
            -subj "/CN=iOS Distribution/O=Personal/C=JP"

          # --- 4. Create JWT & call App Store Connect API via Python ---
          python3 << 'PYEOF'
          import jwt, json, time, os, subprocess, sys, base64, urllib.request, urllib.error

          key_id = os.environ["APP_STORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          key_path = os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")

          with open(key_path, "r") as f:
              key_data = f.read()

          # Generate JWT
          now = int(time.time())
          token = jwt.encode(
              {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
              key_data,
              algorithm="ES256",
              headers={"kid": key_id}
          )
          print(f"✅ JWT created successfully")

          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          def api_request(url, data=None):
              req = urllib.request.Request(url, headers=headers)
              if data:
                  req.data = json.dumps(data).encode()
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  body = json.loads(e.read())
                  print(f"API Error {e.code}: {json.dumps(body, indent=2)}", file=sys.stderr)
                  raise

          # Check existing iOS Distribution certificates
          print("Checking existing certificates...")
          certs_resp = api_request(
              "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION&limit=200"
          )
          existing = certs_resp.get("data", [])
          print(f"Found {len(existing)} existing iOS Distribution certificate(s)")

          cert_content = None
          need_new_key = False

          if existing:
              # Use existing certificate
              cert_content = existing[0]["attributes"]["certificateContent"]
              print("Using existing certificate")
              need_new_key = True  # We don't have the private key for existing cert

          if need_new_key or not existing:
              if existing:
                  # We have an existing cert but no private key for it
                  # We must revoke and recreate, or create a new one
                  print("Existing cert found but we need a new one with our key...")
                  # Try creating new - Apple allows up to 2 distribution certs

              # Read CSR
              csr_path = os.path.expanduser("~/cert.csr")
              with open(csr_path, "r") as f:
                  csr_content = f.read()

              print("Creating new iOS Distribution certificate...")
              try:
                  create_resp = api_request(
                      "https://api.appstoreconnect.apple.com/v1/certificates",
                      {
                          "data": {
                              "type": "certificates",
                              "attributes": {
                                  "certificateType": "IOS_DISTRIBUTION",
                                  "csrContent": csr_content
                              }
                          }
                      }
                  )
                  cert_content = create_resp["data"]["attributes"]["certificateContent"]
                  print("✅ New certificate created successfully")
              except urllib.error.HTTPError as e:
                  if existing:
                      print("Could not create new cert (limit reached). Revoking oldest and retrying...")
                      # Revoke the oldest cert
                      oldest_id = existing[0]["id"]
                      revoke_req = urllib.request.Request(
                          f"https://api.appstoreconnect.apple.com/v1/certificates/{oldest_id}",
                          headers=headers,
                          method="DELETE"
                      )
                      urllib.request.urlopen(revoke_req)
                      print(f"Revoked certificate {oldest_id}")

                      # Retry creation
                      create_resp = api_request(
                          "https://api.appstoreconnect.apple.com/v1/certificates",
                          {
                              "data": {
                                  "type": "certificates",
                                  "attributes": {
                                      "certificateType": "IOS_DISTRIBUTION",
                                      "csrContent": csr_content
                                  }
                              }
                          }
                      )
                      cert_content = create_resp["data"]["attributes"]["certificateContent"]
                      print("✅ New certificate created after revoking old one")
                  else:
                      raise

          # Save certificate
          cert_der = base64.b64decode(cert_content)
          cert_path = os.path.expanduser("~/cert.cer")
          with open(cert_path, "wb") as f:
              f.write(cert_der)
          print(f"Certificate saved to {cert_path}")
          PYEOF

          # --- 5. Create PKCS12 and import into keychain ---
          openssl x509 -inform DER -in ~/cert.cer -out ~/cert.pem
          CERT_PASSWORD=$(openssl rand -hex 12)
          openssl pkcs12 -export -out ~/cert.p12 \
            -inkey ~/cert_key.pem -in ~/cert.pem \
            -passout "pass:$CERT_PASSWORD"

          security import ~/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Certificates in keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "✅ Signing certificate installed successfully"

      - name: Build iOS app
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="9ZQY7HY294" \
            CODE_SIGN_STYLE="Automatic" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cd ios/App
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9ZQY7HY294</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: ios/App/build/export/*.ipa

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f ~/cert_key.pem ~/cert.csr ~/cert.cer ~/cert.pem ~/cert.p12 2>/dev/null || true
