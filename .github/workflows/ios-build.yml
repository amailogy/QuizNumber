name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      TEAM_ID: "9ZQY7HY294"
      BUNDLE_ID: "com.amailogy.nanmonme"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Create signing certificate and setup keychain
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          set -euo pipefail

          # --- 1. Setup API key file ---
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # --- 2. Create temporary keychain ---
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Save keychain info for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          # --- 3. Generate private key and CSR ---
          openssl genrsa -out ~/cert_key.pem 2048
          openssl req -new -key ~/cert_key.pem -out ~/cert.csr \
            -subj "/CN=iOS Distribution/O=Personal/C=JP"

          # --- 4. Create JWT for App Store Connect API ---
          HEADER=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$APP_STORE_CONNECT_KEY_ID" | openssl base64 -e | tr -d '=' | tr '/+' '_-' | tr -d '\n')
          NOW=$(date +%s)
          EXP=$((NOW + 1200))
          PAYLOAD=$(printf '{"iss":"%s","iat":%d,"exp":%d,"aud":"appstoreconnect-v1"}' "$APP_STORE_CONNECT_ISSUER_ID" "$NOW" "$EXP" | openssl base64 -e | tr -d '=' | tr '/+' '_-' | tr -d '\n')
          SIGN_INPUT="${HEADER}.${PAYLOAD}"
          SIGNATURE=$(printf '%s' "$SIGN_INPUT" | openssl dgst -sha256 -sign ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 | openssl asn1parse -inform DER -out /dev/null 2>/dev/null || true)

          # Use python3 for reliable JWT creation (available on macOS runners)
          JWT=$(python3 << 'PYEOF'
          import json, time, base64, subprocess, sys

          import os
          key_id = os.environ["APP_STORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          key_path = os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")

          # Read the private key
          with open(key_path, "r") as f:
              key_data = f.read()

          try:
              # Try using PyJWT if available
              import jwt
              now = int(time.time())
              token = jwt.encode(
                  {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
                  key_data,
                  algorithm="ES256",
                  headers={"kid": key_id}
              )
              print(token)
          except ImportError:
              # Fallback: use cryptography library
              from cryptography.hazmat.primitives import hashes, serialization
              from cryptography.hazmat.primitives.asymmetric import ec, utils
              import struct

              def b64url(data):
                  if isinstance(data, str):
                      data = data.encode()
                  return base64.urlsafe_b64encode(data).rstrip(b"=").decode()

              header = b64url(json.dumps({"alg": "ES256", "kid": key_id, "typ": "JWT"}))
              now = int(time.time())
              payload = b64url(json.dumps({"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}))
              sign_input = f"{header}.{payload}".encode()

              private_key = serialization.load_pem_private_key(key_data.encode(), password=None)
              der_sig = private_key.sign(sign_input, ec.ECDSA(hashes.SHA256()))

              # Convert DER signature to raw r||s format (64 bytes)
              r, s = utils.decode_dss_signature(int.from_bytes(der_sig, 'big') if isinstance(der_sig, bytes) else der_sig)

              # Actually decode properly
              from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
              r, s = decode_dss_signature(der_sig)
              sig_bytes = r.to_bytes(32, 'big') + s.to_bytes(32, 'big')
              signature = b64url(sig_bytes)

              print(f"{header}.{payload}.{signature}")
          PYEOF
          )

          echo "JWT created successfully"

          # --- 5. Check for existing iOS Distribution certificates ---
          echo "Checking existing certificates..."
          EXISTING_CERTS=$(curl -s -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION&limit=200")

          echo "Existing certs response: $(echo $EXISTING_CERTS | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps({"count": len(d.get("data",[])), "types": [c["attributes"]["certificateType"] for c in d.get("data",[])]}))')"

          # Check if there's an active distribution cert we can use
          CERT_CONTENT=$(echo "$EXISTING_CERTS" | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          certs = data.get("data", [])
          for cert in certs:
              attrs = cert.get("attributes", {})
              if attrs.get("certificateType") == "IOS_DISTRIBUTION":
                  print(attrs.get("certificateContent", ""))
                  break
          ' 2>/dev/null || echo "")

          if [ -n "$CERT_CONTENT" ] && [ "$CERT_CONTENT" != "" ]; then
            echo "Found existing iOS Distribution certificate, using it..."
            echo "$CERT_CONTENT" | base64 -d > ~/cert.cer
          else
            echo "No existing certificate found. Creating new one..."

            # --- 6. Create new iOS Distribution certificate via API ---
            CSR_CONTENT=$(cat ~/cert.csr | base64 | tr -d '\n')

            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"data\":{\"type\":\"certificates\",\"attributes\":{\"certificateType\":\"IOS_DISTRIBUTION\",\"csrContent\":\"$CSR_CONTENT\"}}}" \
              "https://api.appstoreconnect.apple.com/v1/certificates")

            echo "Create cert response status: $(echo $CREATE_RESPONSE | python3 -c 'import sys,json; d=json.load(sys.stdin); errs=d.get("errors",[]); print(errs[0]["title"] if errs else "OK")')"

            CERT_CONTENT=$(echo "$CREATE_RESPONSE" | python3 -c '
            import sys, json
            data = json.load(sys.stdin)
            cert_data = data.get("data", {}).get("attributes", {}).get("certificateContent", "")
            if not cert_data:
                errors = data.get("errors", [])
                if errors:
                    print(f"ERROR: {errors[0].get(\"detail\", \"Unknown error\")}", file=sys.stderr)
                    sys.exit(1)
            print(cert_data)
            ')

            echo "$CERT_CONTENT" | base64 -d > ~/cert.cer
          fi

          # --- 7. Create PKCS12 and import into keychain ---
          # Convert the DER certificate to PEM
          openssl x509 -inform DER -in ~/cert.cer -out ~/cert.pem

          # Create PKCS12 bundle with the private key and certificate
          CERT_PASSWORD=$(openssl rand -hex 12)
          openssl pkcs12 -export -out ~/cert.p12 \
            -inkey ~/cert_key.pem -in ~/cert.pem \
            -passout "pass:$CERT_PASSWORD"

          # Import into keychain
          security import ~/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          # Set key partition list to allow codesign access
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify certificate was imported
          echo "Certificates in keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "✅ Signing certificate installed successfully"

      - name: Build iOS app
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="9ZQY7HY294" \
            CODE_SIGN_STYLE="Automatic" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cd ios/App
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9ZQY7HY294</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: ios/App/build/export/*.ipa

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f ~/cert_key.pem ~/cert.csr ~/cert.cer ~/cert.pem ~/cert.p12 2>/dev/null || true
